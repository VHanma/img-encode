name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Native Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 40

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Install Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Collect APK
        run: |
          mkdir -p artifact-apk
          find . -type f -iname "*.apk" | sort | tee apk-files.txt
          RAW_APK="$(head -n 1 apk-files.txt)"
          cp "$RAW_APK" artifact-apk/DNA-Forge-Max-native-debug.apk
          ls -lh artifact-apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DNA-Forge-Max-native-debug-apk
          path: artifact-apk/*.apk
          if-no-files-found: error
