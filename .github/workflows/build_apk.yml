name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [ master, main, 'autocoder/**', 'fix/**' ]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: chmod +x ./gradlew || true
      - name: Build signed debug APK
        run: |
          if [ -f ./gradlew ]; then
            ./gradlew assembleDebug --stacktrace
          else
            echo "No gradlew found"; exit 1
          fi
      - run: find . -type f -name "*.apk" -print
      - uses: actions/upload-artifact@v4
        with:
          name: Living-Image-DNA-Forge-Max-debug-signed-apk
          path: |
            **/build/outputs/apk/debug/*.apk
            **/*.apk
