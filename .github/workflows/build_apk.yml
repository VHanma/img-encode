name: Build APK

on:
  push:
    branches:
      - main
      - master
      - android-app
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk \
            build-essential libffi-dev libssl-dev \
            python3-dev autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libltdl-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade buildozer virtualenv
          python -m pip install "Cython==0.29.36"

      - name: Clone stable python-for-android
        run: |
          rm -rf "$RUNNER_TEMP/p4a-stable"
          git clone --depth 1 --branch v2024.01.21 https://github.com/kivy/python-for-android.git "$RUNNER_TEMP/p4a-stable"

      - name: Build APK
        run: |
          export JAVA_HOME="$JAVA_HOME_17_X64"
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version

          cd "$GITHUB_WORKSPACE"

          python - <<'PY2'
          from pathlib import Path
          import os

          p = Path("buildozer.spec")
          lines = p.read_text().splitlines()

          clean = []
          for line in lines:
              stripped = line.strip()
              if stripped.startswith(("p4a.source_dir", "p4a.branch", "p4a.url", "p4a.fork", "p4a.commit")):
                  continue
              clean.append(line)

          out = []
          inserted = False
          for line in clean:
              if line.strip() == "[buildozer]" and not inserted:
                  out.append(f"p4a.source_dir = {os.environ['RUNNER_TEMP']}/p4a-stable")
                  out.append("")
                  inserted = True
              out.append(line)

          p.write_text("\n".join(out) + "\n")
          PY2

          echo "=== FINAL buildozer.spec ==="
          cat buildozer.spec

          buildozer android clean || true
          yes | buildozer android debug 2>&1 | tee build.log
          exit "${PIPESTATUS[1]}"

      - name: Find, align, and sign APK
        if: always()
        run: |
          export JAVA_HOME="$JAVA_HOME_17_X64"
          export PATH="$JAVA_HOME/bin:$PATH"

          mkdir -p artifact-apk

          echo "=== RAW APK SEARCH ===" | tee -a build.log
          find "$GITHUB_WORKSPACE" -type f -iname "*.apk" | sort | tee apk-files.txt || true

          if [ ! -s apk-files.txt ]; then
            echo "No APK files found." | tee -a build.log
            exit 1
          fi

          RAW_APK="$(head -n 1 apk-files.txt)"
          echo "Using raw APK: $RAW_APK" | tee -a build.log

          cp "$RAW_APK" artifact-apk/original-livingimage.apk

          ZIPALIGN="$(find "$ANDROID_HOME/build-tools" -name zipalign | sort -V | tail -n 1)"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -n 1)"

          echo "zipalign: $ZIPALIGN" | tee -a build.log
          echo "apksigner: $APKSIGNER" | tee -a build.log

          keytool -genkeypair \
            -v \
            -keystore artifact-apk/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

          "$ZIPALIGN" -p -f 4 "$RAW_APK" artifact-apk/LivingImage-v20-aligned.apk

          "$APKSIGNER" sign \
            --ks artifact-apk/debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out artifact-apk/LivingImage-v20-signed.apk \
            artifact-apk/LivingImage-v20-aligned.apk

          echo "=== SIGNATURE VERIFY ===" | tee -a build.log
          "$APKSIGNER" verify --verbose artifact-apk/LivingImage-v20-signed.apk | tee -a build.log

          echo "=== artifact-apk contents ===" | tee -a build.log
          find artifact-apk -type f | sort | tee -a build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LivingImage-v20-signed
          path: artifact-apk/*.apk
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            build.log
            apk-files.txt
          if-no-files-found: warn
