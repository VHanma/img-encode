name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - 'fix/**'
      - 'autocoder/**'
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk \
            build-essential libffi-dev libssl-dev \
            python3-dev autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libltdl-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install "Cython==0.29.36"
          python -m pip install --upgrade buildozer virtualenv

      - name: Show clean files
        run: |
          echo "=== main.py first lines ==="
          sed -n '1,40p' main.py
          echo "=== buildozer.spec ==="
          cat buildozer.spec

      - name: Build debug APK
        run: |
          export JAVA_HOME="$JAVA_HOME_17_X64"
          export PATH="$JAVA_HOME/bin:$PATH"
          java -version
          buildozer android clean || true
          yes | buildozer -v android debug 2>&1 | tee build.log
          exit "${PIPESTATUS[1]}"

      - name: Collect APK
        if: always()
        run: |
          mkdir -p artifact-apk
          echo "=== APK SEARCH ===" | tee -a build.log
          find . -type f -iname "*.apk" | sort | tee apk-files.txt || true

          if [ ! -s apk-files.txt ]; then
            echo "No APK files found." | tee -a build.log
            exit 1
          fi

          RAW_APK="$(head -n 1 apk-files.txt)"
          cp "$RAW_APK" artifact-apk/DNA-Forge-Max-debug.apk

          echo "APK copied:"
          ls -lh artifact-apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DNA-Forge-Max-debug-apk
          path: artifact-apk/*.apk
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            build.log
            apk-files.txt
          if-no-files-found: warn
