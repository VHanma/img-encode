name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - 'autocoder/**'
      - 'fix/**'
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK with Buildozer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build APK with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          workdir: .
          buildozer_version: stable

      - name: Show APK files
        run: |
          echo "Buildozer output:"
          echo "${{ steps.buildozer.outputs.filename }}"
          echo ""
          echo "All APK files:"
          find . -type f -name "*.apk" -print || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: img-encode-buildozer-apk
          path: |
            ${{ steps.buildozer.outputs.filename }}
            bin/*.apk
            **/*.apk
