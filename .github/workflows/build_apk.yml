name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - 'autocoder/**'
      - 'fix/**'
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show repo files
        run: |
          pwd
          ls -la
          test -f buildozer.spec || { echo "No buildozer.spec found"; exit 1; }
          test -f main.py || { echo "No main.py found"; exit 1; }

      - name: Build APK with Buildozer Docker
        run: |
          docker run --rm \
            -v "$PWD":/home/user/app \
            -w /home/user/app \
            ghcr.io/kivy/buildozer:latest \
            bash -lc "buildozer android debug"

      - name: Find APKs
        run: |
          echo "APK files:"
          find . -type f -name "*.apk" -print

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: img-encode-debug-apk
          path: |
            bin/*.apk
            **/*.apk
