name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.15"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install system deps
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip curl wget \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5 libncursesw5-dev \
            libffi-dev libssl-dev libsqlite3-dev \
            libjpeg-dev libpng-dev \
            build-essential ccache

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-v26-${{ hashFiles('buildozer.spec', 'main.py', 'v22_living_image.py') }}
          restore-keys: |
            buildozer-${{ runner.os }}-v26-
            buildozer-${{ runner.os }}-

      - name: Install Python dependencies
        run: |
          set -eux
          python -m pip install --upgrade pip wheel setuptools virtualenv
          python -m pip install buildozer==1.5.0 "Cython==0.29.36" sh==1.14.3 appdirs colorama jinja2

      - name: Prepare Buildozer spec
        run: |
          set -eux
          python - <<'PY'
          from pathlib import Path
          import re

          p = Path("buildozer.spec")
          if not p.exists():
              raise SystemExit("buildozer.spec missing")

          s = p.read_text()

          def set_kv(text, key, value):
              pat = re.compile(rf"^#?\s*{re.escape(key)}\s*=.*$", re.M)
              line = f"{key} = {value}"
              if pat.search(text):
                  return pat.sub(line, text)
              return text.rstrip() + "\n" + line + "\n"

          s = set_kv(s, "requirements", "python3==3.11.5,hostpython3==3.11.5,kivy==2.3.0,pillow==9.5.0,numpy,requests,androidstorage4kivy")
          s = set_kv(s, "android.api", "33")
          s = set_kv(s, "android.minapi", "24")
          s = set_kv(s, "android.ndk_api", "24")
          s = set_kv(s, "android.ndk", "25c")
          s = set_kv(s, "android.archs", "arm64-v8a")
          s = set_kv(s, "android.permissions", "READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE,INTERNET")
          s = set_kv(s, "source.exclude_dirs", ".git,.github,.buildozer,bin,build,dist,v1-python,v2-js,v3,p4a-stable,encoder_android_output,encoder_android_output_v6,__pycache__")
          s = set_kv(s, "log_level", "2")

          p.write_text(s, newline="\n")
          PY

          echo "===== buildozer.spec key lines ====="
          grep -n "requirements\|android.api\|android.minapi\|android.ndk_api\|android.archs\|android.permissions\|source.exclude_dirs\|log_level" buildozer.spec || true

      - name: Build APK
        run: |
          set -eux
          python -m py_compile main.py
          yes | buildozer -v android debug 2>&1 | tee build.log

      - name: Find, align, and sign APK
        run: |
          set -eux

          mkdir -p artifact-apk build-log

          find . -type f -iname "*.apk" -print | sort | tee build-log/apk-files.txt

          APK="$(find . -type f -iname "*.apk" | sort | tail -n 1)"
          if [ -z "$APK" ]; then
            echo "No APK found after build"
            exit 1
          fi

          echo "Original APK: $APK"
          cp "$APK" artifact-apk/original-livingimage.apk

          # Find build-tools — check buildozer's SDK first, then runner's ANDROID_HOME
          BT_DIR=""
          for sdk_root in \
            "$HOME/.buildozer/android/platform/android-sdk" \
            "${ANDROID_HOME:-/usr/local/lib/android/sdk}" \
            "/usr/local/lib/android/sdk" \
            "/opt/android-sdk"; do
            if [ -d "$sdk_root/build-tools" ]; then
              BT_DIR="$(ls -d "$sdk_root/build-tools"/* 2>/dev/null | sort -V | tail -n 1)"
              [ -n "$BT_DIR" ] && break
            fi
          done

          if [ -z "$BT_DIR" ]; then
            echo "No build-tools found in any SDK location — installing via sdkmanager"
            SDKMANAGER="$HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager"
            yes | "$SDKMANAGER" "build-tools;34.0.0" || true
            BT_DIR="$HOME/.buildozer/android/platform/android-sdk/build-tools/34.0.0"
          fi

          echo "Using build-tools: $BT_DIR"
          ZIPALIGN="$BT_DIR/zipalign"
          APKSIGNER="$BT_DIR/apksigner"

          "$ZIPALIGN" -p -f 4 artifact-apk/original-livingimage.apk artifact-apk/LivingImage-v22-aligned.apk

          keytool -genkeypair \
            -v \
            -keystore artifact-apk/debug-upload-key.jks \
            -storepass android \
            -keypass android \
            -alias livingimage \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=VHanma Living Image,O=VHanma,C=US"

          "$APKSIGNER" sign \
            --ks artifact-apk/debug-upload-key.jks \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out artifact-apk/LivingImage-v22-signed.apk \
            artifact-apk/LivingImage-v22-aligned.apk

          "$APKSIGNER" verify --verbose artifact-apk/LivingImage-v22-signed.apk | tee -a build.log

          ls -lh artifact-apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LivingImage-v22-signed
          path: artifact-apk/*
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            build.log
            build-log/*
          if-no-files-found: ignore
